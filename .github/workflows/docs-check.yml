name: Documentation check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - ".codex/**"
      - "scripts/check-docs.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".codex/**"
      - "scripts/check-docs.mjs"
      - "package.json"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:check
