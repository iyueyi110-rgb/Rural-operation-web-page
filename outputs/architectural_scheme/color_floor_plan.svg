    <circle cx="463" cy="455" r="21" class="numCircle"/><text x="457" y="463" class="num">2</text>
    <text x="302" y="303" class="label">纺织工坊</text>
    <text x="302" y="328" class="tiny">织机体验 / 手作课程</text>

    <circle cx="755" cy="496" r="21" class="numCircle"/><text x="749" y="504" class="num">3</text>
    <text x="646" y="356" class="label">研发土墙</text>
    <text x="646" y="381" class="tiny">材料样本 / 研学讨论</text>

    <circle cx="1042" cy="455" r="21" class="numCircle"/><text x="1036" y="463" class="num">4</text>
