<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1200" viewBox="0 0 2000 1200">
  <defs>
    <style>
      .paper{fill:#fbf8ef}
      .title{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#2b2925;font-size:44px;font-weight:700}
      .subtitle{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#6f6659;font-size:22px}
      .label{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#2b2925;font-size:24px;font-weight:700}
      .small{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#504a42;font-size:18px}
      .tiny{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#5f564a;font-size:15px}
      .wall{fill:#58514a;stroke:#2f2b27;stroke-width:4;stroke-linejoin:round}
      .roof{fill:#6a625a;stroke:#2d2925;stroke-width:3;stroke-linejoin:round;opacity:.92}
      .outline{fill:none;stroke:#241f1b;stroke-width:5;stroke-linejoin:round}
      .door{stroke:#2d2925;stroke-width:4;fill:none;stroke-linecap:round}
      .furn{fill:#9b7651;stroke:#6a5038;stroke-width:2}
      .path{fill:none;stroke:#c2a26f;stroke-width:32;stroke-linecap:round;stroke-linejoin:round;opacity:.78}
      .pathEdge{fill:none;stroke:#8d7450;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.75}
      .contour{fill:none;stroke:#c9b96a;stroke-width:3;stroke-linecap:round;opacity:.6}
      .contourMajor{fill:none;stroke:#8fa866;stroke-width:4;stroke-linecap:round;opacity:.65}
      .field{fill:#d9d79a;stroke:#8b9a47;stroke-width:4;stroke-linejoin:round}
      .fieldLine{fill:none;stroke:#9fa64e;stroke-width:3;opacity:.75}
      .platform{fill:#ded1bb;stroke:#9b8664;stroke-width:4;stroke-linejoin:round}
      .stone{fill:#cfc6b7;stroke:#8b7e70;stroke-width:2}
      .tree{fill:#6f985b;stroke:#375a34;stroke-width:3}
      .tree2{fill:#89ad6c;stroke:#557847;stroke-width:2}
      .numCircle{fill:#2f2b27}
      .num{font-family:Arial,sans-serif;fill:#fff;font-size:21px;font-weight:700}
      .legendBox{fill:#fffaf0;stroke:#c4b69f;stroke-width:2}
      .arr{stroke:#776047;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .north{fill:#2f2b27}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#776047"/>
    </marker>
    <pattern id="roofTiles" width="26" height="18" patternUnits="userSpaceOnUse">
      <rect width="26" height="18" fill="#6a625a"/>
      <path d="M0 9 Q6 3 13 9 T26 9M0 17H26" stroke="#3f3934" stroke-width="1.6" fill="none" opacity=".7"/>
    </pattern>
    <pattern id="farmRows" width="58" height="42" patternUnits="userSpaceOnUse">
      <rect width="58" height="42" fill="#d9d79a"/>
      <path d="M-10 40 C12 26 30 28 68 12M-10 22 C12 8 30 10 68 -6" stroke="#a2a65a" stroke-width="2" fill="none" opacity=".8"/>
    </pattern>
    <pattern id="stonePaving" width="56" height="42" patternUnits="userSpaceOnUse">
      <rect width="56" height="42" fill="#ded1bb"/>
      <path d="M0 14H56M0 28H56M18 0V14M40 14V28M12 28V42M48 28V42" stroke="#b8a88f" stroke-width="2" fill="none" opacity=".75"/>
    </pattern>
