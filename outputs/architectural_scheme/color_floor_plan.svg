    <text x="1466" y="329" class="tiny">茶席 / 吧台 / 备餐</text>

    <circle cx="1485" cy="672" r="21" class="numCircle"/><text x="1479" y="680" class="num">7</text>
    <text x="1588" y="708" class="label">展陈区</text>
    <text x="1588" y="733" class="tiny">村史 / 工艺 / 产品</text>

    <circle cx="1088" cy="672" r="21" class="numCircle"/><text x="1082" y="680" class="num">8</text>
