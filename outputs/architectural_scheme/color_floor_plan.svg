    <polygon class="wall" points="100,470 258,452 258,612 100,630"/>
    <polygon fill="#e6b07a" stroke="#2f2b27" stroke-width="3" points="124,494 230,484 230,580 124,592"/>
    <path class="door" d="M178,592 C178,560 196,540 230,540"/>
