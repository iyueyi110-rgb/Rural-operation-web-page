  <text x="106" y="972" class="label" style="font-size:26px">功能色彩图例</text>
  <rect x="108" y="1002" width="34" height="24" fill="#e6b07a" stroke="#2f2b27"/><text x="156" y="1022" class="small">入口服务</text>
  <rect x="276" y="1002" width="34" height="24" fill="#d8a577" stroke="#2f2b27"/><text x="324" y="1022" class="small">纺织工坊</text>
  <rect x="452" y="1002" width="34" height="24" fill="#b9c69a" stroke="#2f2b27"/><text x="500" y="1022" class="small">研发土墙</text>
  <rect x="108" y="1044" width="34" height="24" fill="#c8b8dd" stroke="#2f2b27"/><text x="156" y="1064" class="small">接待讲解</text>
  <rect x="276" y="1044" width="34" height="24" fill="#b7d2c5" stroke="#2f2b27"/><text x="324" y="1064" class="small">茶饮体验</text>
  <rect x="452" y="1044" width="34" height="24" fill="#efc27b" stroke="#2f2b27"/><text x="500" y="1064" class="small">展陈区</text>
  <rect x="108" y="1086" width="34" height="24" fill="url(#farmRows)" stroke="#8b9a47"/><text x="156" y="1106" class="small">农田台地</text>
  <rect x="276" y="1086" width="34" height="24" fill="url(#stonePaving)" stroke="#8b7e70"/><text x="324" y="1106" class="small">石铺平台</text>
  <circle cx="469" cy="1098" r="15" class="tree"/><text x="500" y="1106" class="small">保留树木</text>

