  <rect class="paper" width="2000" height="1200"/>
  <text x="76" y="76" class="title">建筑平面方案彩平图</text>
  <text x="78" y="116" class="subtitle">依据手绘草图整理：沿坡脚平台展开，下方为农田台地，建筑轮廓与功能关系保持原方案逻辑</text>

