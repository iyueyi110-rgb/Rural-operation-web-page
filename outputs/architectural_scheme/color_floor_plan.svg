  <!-- paving texture overlay on platform -->
  <path fill="url(#stonePaving)" opacity=".42" d="M75,640 C235,545 405,522 585,535 C735,546 855,515 980,470 C1115,420 1260,440 1395,518 C1528,594 1608,700 1710,845 L1500,870 C1350,760 1225,710 1040,735 C865,758 735,696 570,688 C390,680 225,730 75,792 Z"/>

