  <path class="field" fill="url(#farmRows)" d="M0,745 C160,700 260,780 430,742 C610,700 730,785 900,782 C1058,780 1230,730 1415,810 C1540,866 1660,860 2000,825 L2000,1200 L0,1200 Z"/>
  <path class="fieldLine" d="M115,895 C360,830 620,900 850,890 C1120,878 1360,930 1640,875"/>
  <path class="fieldLine" d="M160,1030 C430,960 700,1040 980,1010 C1240,982 1505,1045 2000,960"/>
  <path class="fieldLine" d="M410,742 L520,1200M805,790 L900,1200M1180,742 L1320,1200M1510,842 L1585,1200"/>
  <text x="620" y="910" class="label" style="fill:#647532;font-size:32px">农田台地</text>

