<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg{fill:#fbf8f0}
      .water{fill:#d9e9e4;stroke:#79a8a1;stroke-width:4}
      .bank{fill:none;stroke:#8d7660;stroke-width:12;stroke-linecap:round}
      .route{fill:none;stroke:#b99b68;stroke-width:34;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
      .mass{fill:#d6cec1;stroke:#231f1b;stroke-width:7;stroke-linejoin:round}
      .roof{fill:#5b5751;stroke:#231f1b;stroke-width:5;stroke-linejoin:round;opacity:.9}
      .void{fill:#f7f0df;stroke:#51473e;stroke-width:4}
      .tree{fill:#7c9f62;stroke:#3e5c32;stroke-width:4}
      .label{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#26221e;font-size:30px;font-weight:650}
      .small{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#40382f;font-size:22px}
      .note{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#7a332c;font-size:22px;font-weight:650}
      .arrow{stroke:#7a332c;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#7a332c"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1200"/>
  <text x="72" y="78" class="label" style="font-size:42px">草图轮廓锁定控制图</text>
  <text x="74" y="120" class="small">后续效果图必须保留：左侧正交工坊组团、中段接待/庭院、右侧两个斜置体量、下方弧形水岸与折线游线</text>

  <path class="water" d="M0,835 C210,655 405,615 610,670 C748,708 838,770 984,748 C1140,724 1250,660 1410,742 C1548,812 1630,925 1800,995 L1800,1200 L0,1200 Z"/>
  <path class="bank" d="M0,800 C210,620 405,580 615,635 C770,675 840,755 990,710 C1134,666 1258,625 1418,708 C1548,776 1648,884 1800,940"/>
  <path class="route" d="M120,622 C270,596 430,608 572,628 C704,646 810,645 925,603 C1036,562 1135,545 1246,578 C1355,610 1435,690 1526,820"/>

  <!-- Locked massing follows the original sketch, not a free composition -->
  <polygon class="mass" points="82,490 225,462 260,540 116,575"/>
  <polygon class="roof" points="60,465 226,430 285,505 105,540"/>
  <text x="72" y="435" class="small">入口/售票</text>

  <polygon class="mass" points="238,388 504,378 530,505 250,525"/>
  <polygon class="roof" points="218,350 500,340 552,398 258,420"/>
  <line x1="350" y1="385" x2="355" y2="515" stroke="#51473e" stroke-width="4"/>
  <text x="265" y="330" class="small">纺织工坊</text>

  <polygon class="mass" points="535,430 712,420 725,545 550,555"/>
  <polygon class="roof" points="510,392 704,375 752,430 536,462"/>
  <text x="545" y="375" class="small">研发土墙</text>

  <polygon class="mass" points="765,333 1012,330 1088,408 1070,535 790,540"/>
  <polygon class="roof" points="730,300 1018,292 1120,385 1080,432 780,424"/>
  <path class="void" d="M820,445 C890,486 980,488 1048,442 L1050,515 C970,565 880,560 815,515Z"/>
  <text x="802" y="278" class="small">接待讲解厅</text>

  <circle cx="1012" cy="610" r="70" class="tree"/>
  <text x="1055" y="632" class="small">保留庭院树</text>

  <polygon class="mass" points="1160,330 1390,260 1480,355 1268,488"/>
  <polygon class="roof" points="1128,290 1392,210 1516,330 1260,380"/>
  <text x="1308" y="245" class="small">茶饮体验区</text>

  <polygon class="mass" points="1270,548 1538,500 1610,736 1348,800"/>
  <polygon class="roof" points="1230,505 1545,448 1644,548 1335,610"/>
  <line x1="1400" y1="555" x2="1454" y2="770" stroke="#51473e" stroke-width="4"/>
  <text x="1518" y="650" class="small">展陈区</text>

  <polygon class="void" points="875,655 1080,612 1100,700 895,740"/>
  <text x="908" y="710" class="small">滨水休憩台</text>

  <path class="arrow" d="M270,905 C550,822 780,845 990,780 C1175,722 1350,760 1530,895"/>
  <text x="345" y="962" class="note">效果图相机可变化，但建筑外轮廓、体量位置和水岸曲线不得改变</text>
</svg>
