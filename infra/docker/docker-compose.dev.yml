services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zouma
      POSTGRES_PASSWORD: zouma_dev
      POSTGRES_DB: zouma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pgdata:
  redis_data:
